<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Plant Production Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="logo-section">
      <div class="logo-icon">
        <i class="fas fa-industry"></i>
      </div>
      <h1>Plant Production Report</h1>
      <p>Daily Crusher Plant Production Monitoring System</p>
    </div>
    
    <div class="error-msg" id="errorMsg"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
      </div>
      
      <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p>Authenticating...</p>
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
    
    <div class="demo-creds">
      <strong>🔑 Demo Credentials:</strong>
      <table>
        <tr><td><span class="role">Admin:</span></td><td>admin / admin123</td></tr>
        <tr><td><span class="role">Manager:</span></td><td>manager / mgr@123</td></tr>
        <tr><td><span class="role">Operator:</span></td><td>sarjapur / site@123</td></tr>
        <tr><td><span class="role">Viewer:</span></td><td>viewer / view@123</td></tr>
      </table>
    </div>
    
    <div class="footer-info">
      <p>Powered by Google Sheets & Apps Script</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
